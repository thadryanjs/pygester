[workspace]
authors = ["Thadryan <thadryan@protonmail.com>"]
channels = ["conda-forge"]
name = "DigestTechPaperSkill"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "python -m py_compile src/*.py src/parsers/*.py"

# QC: verify enrichment output
qc = { cmd = "bash src/qc-enrichment.sh $1", description = "Verify enrichment output in a run directory" }

# Test: run Texify on equation crops for ground truth comparison
test-texify = { cmd = "python tests/texify_test.py", description = "Run Texify inference on equation crops" }

# Sync: pull runs + slurm logs from server storage to local
# Usage: pixi run local-pull-runs [SRC] [DEST]
# Example: pixi run local-pull-runs user@server:/path/to/runs ./runs
# Default: pulls from /mnt/Workspace/Pygester/runs/ to runs/
local-pull-runs = { cmd = "sh -c 'rsync -avz --delete \"${SRC:-/mnt/Workspace/Pygester/runs/}\" \"${DEST:-runs/}\" && rsync -avz \"${LOGSRC:-/mnt/Workspace/Pygester/logs/}\" \"${LOGDEST:-logs/}\"'", description = "Pull runs and slurm logs from server storage to local" }

watch = { cmd = [
    "watchexec", "-r",
    "rsync", "-avz", "--delete",
    "--exclude='.pixi'", "--exclude='__pycache__'", "--exclude='*.pyc'",
    "--exclude='.egg-info'", "--exclude='_build'",
    "--exclude='.git'", "--exclude='.opencode/node_modules/'",
    "--include='*/'", "--include='*.py'", "--include='*.md'", "--include='*.toml'",
    "--include='*.json'", "--include='*.ipynb'", "--include='*.sh'", "--exclude='*'", "./", "/mnt/Workspace/Pygester"
] }

# Cleanup
clean = "rm -rf run run-foffano run-cortes runs"

[dependencies]
python = ">=3.10,<3.13"
pymupdf = ">=1.24.0"
pydantic = ">=2.8.0"
orjson = ">=3.10.0"
pytest = ">=7.0.0"

[pypi-dependencies]
docling = ">=2.91.0"
